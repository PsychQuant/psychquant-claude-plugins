# APA 7 Forbidden Patterns
# Words and phrases to avoid in academic writing
#
# Format:
#   word/phrase: The term to avoid
#   reason: Why it should be avoided
#   alternative: What to use instead (null = delete)
#   context_exception: When the term IS acceptable

metadata:
  version: "1.0"
  created: "2025-12-30"
  source: "Consolidated from words_to_avoid.md and APA 7 guidelines"
  purpose: "Comprehensive list of patterns AI should flag and replace"

# ============================================
# EMPHASIS WORDS (Delete)
# ============================================
emphasis_words:
  description: "Words that add emphasis but weaken academic writing. Let content provide emphasis."
  action: "DELETE - do not replace with anything"

  patterns:
    - word: "importantly"
      reason: "Importance should be evident from context"
      alternative: null

    - word: "notably"
      reason: "Let the content speak for itself"
      alternative: null

    - word: "significantly"
      reason: "Reserve for statistical contexts only"
      context_exception: "statistical_reporting"
      alternative: null

    - word: "remarkably"
      reason: "Too subjective for academic writing"
      alternative: null

    - word: "interestingly"
      reason: "Subjective; unnecessary meta-commentary"
      alternative: null

    - word: "obviously"
      reason: "Can be condescending; if obvious, no need to state"
      alternative: null

    - word: "clearly"
      reason: "If clear, you don't need to say so"
      alternative: null

    - word: "indeed"
      reason: "Often redundant"
      alternative: null

    - word: "actually"
      reason: "Usually unnecessary"
      alternative: null

    - word: "really"
      reason: "Too informal"
      alternative: null

    - word: "critically"
      reason: "Overused; let content demonstrate importance"
      alternative: null

    - word: "fundamental"
      reason: "Overly strong emphasis"
      alternative: ["primary", "key"]

# ============================================
# VAGUE QUALIFIERS (Delete or Specify)
# ============================================
vague_qualifiers:
  description: "Vague terms that should be replaced with specific measurements or deleted"
  action: "DELETE or REPLACE with specific value"

  patterns:
    - word: "relatively"
      reason: "Be specific about the comparison"
      alternative: null
      instruction: "State the actual comparison"

    - word: "somewhat"
      reason: "Too vague"
      alternative: null

    - word: "quite"
      reason: "Usually unnecessary"
      alternative: null

    - word: "very"
      reason: "Use a stronger single word instead"
      alternative: null
      instruction: "Replace 'very X' with a stronger adjective"

    - word: "extremely"
      reason: "Use a more precise term"
      alternative: null

    - word: "basically"
      reason: "Too informal"
      alternative: null

    - word: "essentially"
      reason: "Often redundant"
      alternative: null

    - word: "virtually"
      reason: "Be more precise"
      alternative: null

    - word: "practically"
      reason: "Too informal"
      alternative: null

    - word: "fairly"
      reason: "Too vague"
      alternative: null

    - word: "nuanced"
      reason: "Pretentious; be specific"
      alternative: ["complex", "detailed"]

# ============================================
# PSYCHOLOGY-SPECIFIC FORBIDDEN TERMS
# ============================================
psychology_specific:
  description: "Terms with specific problems in psychological research writing"
  action: "REPLACE with alternatives"

  patterns:
    - word: "influence"
      reason: "Implies causation in correlational studies"
      alternative: ["association", "relationship", "variance explained"]
      context_exception: "experimental_study_with_manipulation"

    - word: "trigger"
      reason: "Too strong and mechanical for psychological processes"
      alternative: ["lead to", "result in", "contribute to"]

    - word: "impact"
      reason: "Often implies causation; overused"
      alternative: ["effect", "association", "relationship"]
      context_exception: "experimental_study_with_manipulation"

    - word: "key insight"
      reason: "Too subjective and presumptuous"
      alternative: null
      instruction: "State the finding directly without meta-commentary"

    - word: "proves"
      reason: "Science doesn't prove; it provides evidence"
      alternative: ["suggests", "indicates", "supports", "demonstrates"]

    - word: "normal"
      reason: "Can be stigmatizing; often imprecise"
      alternative: ["typical", "expected", "neurotypical"]
      context_exception: "statistical_normal_distribution"

# ============================================
# STRUCTURAL PATTERNS TO AVOID
# ============================================
structural_patterns:
  description: "Structural and formatting issues to flag"

  patterns:
    - pattern: "arbitrary bold headings within paragraphs"
      reason: "APA discourages bold headings within continuous text"
      instruction: "Use natural paragraph breaks and topic sentences"

    - pattern: "rhetorical questions"
      reason: "Avoid 'An important question arises: why...?' format"
      instruction: "Use direct statements instead"
      examples:
        avoid: "An important question arises: why do students struggle?"
        prefer: "Students may struggle because..."

    - pattern: "making X central statements"
      reason: "Avoid 'making X central to understanding Y'"
      instruction: "Let evidence demonstrate importance"

    - pattern: "historicizing statements"
      reason: "Avoid 'establishing X as important for Y'"
      instruction: "Present evidence directly"

# ============================================
# FORMATTING NOTES
# ============================================
formatting_notes:
  colons:
    description: "APA prefers complete sentences over colon-introduced lists"
    avoid: "Three factors: ability, outcome, and learning."
    prefer: "Three factors were identified, including ability, outcome, and learning."
    connectors: ["including", "consisting of", "specifically", "namely"]

  numbers:
    description: "Number usage in APA 7"
    rules:
      - "Use numerals for 10 and above"
      - "Use words for below 10 in general text"
      - "Use numerals for scale items (7-point Likert scale)"
      - "Use numerals in mathematical/statistical contexts"

# ============================================
# QUICK SCAN CHECKLIST
# ============================================
quick_scan:
  description: "Fast check for common issues"

  delete_immediately:
    - "importantly"
    - "notably"
    - "interestingly"
    - "obviously"
    - "clearly"
    - "It is important to note that"
    - "It should be noted that"
    - "As a matter of fact"

  check_context:
    - "significantly"  # OK if statistical
    - "influence"      # OK if experimental
    - "impact"         # OK if experimental
    - "normal"         # OK if statistical distribution

  replace_always:
    - "due to the fact that" → "because"
    - "in order to" → "to"
    - "The study found" → "We found"
    - "a lot of" → "many/much"

# ============================================
# AI-GENERATED TEXT PATTERNS (Reduce AI Feel)
# ============================================
ai_generated_patterns:
  description: "Patterns characteristic of AI-generated academic prose. These patterns are technically correct but produce writing that feels mechanical, over-polished, or formulaic. Human academic writing has more variation and asymmetry."
  action: "REWRITE to sound more natural"

  # --- Punctuation overuse ---
  punctuation:
    - pattern: "em-dash parentheticals"
      reason: "AI overuses em-dashes for mid-sentence insertions. Human writers use them sparingly."
      instruction: "Restructure as a separate clause, use commas, or split into two sentences"
      example:
        avoid: "The method---which has been widely adopted---performs well."
        prefer: "The method, which has been widely adopted, performs well."

    - pattern: "excessive semicolons joining independent clauses"
      reason: "AI tends to chain clauses with semicolons instead of using periods"
      instruction: "Use a period and start a new sentence"

  # --- Formulaic transitions ---
  formulaic_transitions:
    - phrase: "Building on this"
      reason: "Overused AI transition"
      alternative: null
      instruction: "Start the new idea directly or use a specific connective"

    - phrase: "With this in mind"
      reason: "Generic AI filler transition"
      alternative: null

    - phrase: "In light of this"
      reason: "Overused; often adds no information"
      alternative: null

    - phrase: "Taken together"
      reason: "AI default for summarizing multiple points"
      alternative: ["Together", "Overall"]
      instruction: "Use only when genuinely synthesizing, not as a paragraph opener"

    - phrase: "It is worth noting that"
      reason: "Meta-commentary that delays the point"
      alternative: null

  # --- Symmetrical padding ---
  symmetrical_padding:
    - pattern: "both X and Y"
      reason: "AI overuses 'both...and' for emphasis. Often 'and' alone suffices."
      instruction: "Remove 'both' unless the pairing is genuinely surprising or contrastive"
      example:
        avoid: "This is relevant both theoretically and practically."
        prefer: "This is relevant theoretically and practically."

    - pattern: "not only X but also Y"
      reason: "AI defaults to this for any paired statement. Wordy."
      instruction: "Use 'X and Y' or 'X as well as Y' when the contrast is not the point"

  # --- Over-smooth flow ---
  over_smooth_flow:
    - pattern: "every sentence starts with a connective"
      reason: "AI tends to add However/Moreover/Furthermore/Additionally to every sentence, producing an unnaturally smooth flow. Human writing tolerates abrupt transitions."
      instruction: "Remove connectives from at least 30% of sentences. Let juxtaposition do the work."

    - pattern: "Moreover"
      reason: "Overused by AI. Often a simple 'Also' or nothing is better."
      alternative: [null, "Also"]

    - pattern: "Furthermore"
      reason: "Overused by AI. Often redundant."
      alternative: [null, "Also", "In addition"]

    - pattern: "Additionally"
      reason: "Weak additive connector favored by AI"
      alternative: [null, "Also"]

  # --- Mechanical structure ---
  mechanical_structure:
    - pattern: "triplet lists (X, Y, and Z) in every paragraph"
      reason: "AI defaults to three-item lists. Vary list length: sometimes two items, sometimes four."
      instruction: "Break the pattern. Not every enumeration needs exactly three items."

    - pattern: "perfect topic-sentence paragraphs"
      reason: "AI writes every paragraph as [topic sentence] + [support 1] + [support 2] + [concluding sentence]. Real academic writing is less rigid."
      instruction: "Allow some paragraphs to open with context or evidence before stating the point."

    - pattern: "mirrored sentence pairs"
      reason: "AI often writes pairs like 'X is A. Y is B.' with identical syntactic structure. Vary sentence structure."
      instruction: "Alternate between simple, compound, and complex sentences."

  # --- Generic intensifiers ---
  generic_intensifiers:
    - phrase: "particularly important"
      reason: "AI hedged emphasis"
      alternative: null
      instruction: "State why it is important instead"

    - phrase: "especially relevant"
      reason: "AI hedged emphasis"
      alternative: null

    - phrase: "highly significant"
      reason: "Vague intensifier. Use statistical significance or state the magnitude."
      alternative: null
      context_exception: "statistical_reporting"

    - phrase: "deeply rooted"
      reason: "Cliché favored by AI"
      alternative: ["established", "longstanding"]

  # --- Hollow metacommentary ---
  hollow_metacommentary:
    - phrase: "This is an important point"
      reason: "If important, the content shows it"
      alternative: null

    - phrase: "This raises an important question"
      reason: "Just ask or state the question"
      alternative: null

    - phrase: "It is interesting to note"
      reason: "Let the reader decide what is interesting"
      alternative: null

    - phrase: "In summary"
      reason: "Often unnecessary when the preceding paragraph already concludes the argument"
      alternative: null
      instruction: "Use only at the end of a long, multi-paragraph argument"

# ============================================
# USAGE INSTRUCTIONS
# ============================================
usage:
  priority_order:
    1: "Scan for delete_immediately patterns first"
    2: "Check context-dependent terms"
    3: "Apply replace_always transformations"
    4: "Scan for AI-generated text patterns"
    5: "Check redundancy_exceptions before deleting any cross-reference or discourse marker"
    6: "Flag structural issues for manual review"

  notes:
    - "Context matters: 'significantly' in statistics is correct"
    - "In experimental studies, 'influence' may be appropriate"
    - "When unsure, prefer more conservative language"
    - "These rules supplement, not replace, writer judgment"
